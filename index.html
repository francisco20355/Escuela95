<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sexto TV | Simétrico</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Ajuste para que ocupe el 100% de la pantalla real del celular */
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
        }

        /* Barra superior tipo OmeTV */
        .top-bar {
            height: 50px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ffa500;
            flex-shrink: 0;
            z-index: 10;
        }
        .top-bar span { color: white; margin-left: 5px; }

        /* Contenedor de videos: 50/50 */
        .video-container {
            display: flex;
            flex: 1;
            flex-direction: row; /* Horizontal en PC */
            background: #000;
            min-height: 0;
        }

        .video-box {
            flex: 1;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            background: #111; 
        }

        /* Tu cámara con efecto espejo */
        #localVideo { transform: scaleX(-1); }

        /* Barra de botones inferior */
        .bottom-bar {
            height: 90px;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .btn {
            border: none;
            border-radius: 8px;
            height: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            flex: 1;
        }
        .btn-stop { background: #555; max-width: 100px; }
        .btn-report { background: #ff3b30; max-width: 100px; }
        .btn-next { background: #007bff; font-size: 20px; flex: 2; }

        /* Marcas de agua y estado */
        .watermark { position: absolute; top: 15px; left: 15px; color: rgba(255,255,255,0.5); font-size: 20px; font-weight: bold; pointer-events: none; }
        .status-badge { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 4px; font-size: 12px; }

        /* AJUSTE PARA CELULARES (Videos uno arriba del otro) */
        @media (max-width: 768px) {
            .video-container { flex-direction: column; }
            .btn { font-size: 14px; height: 55px; }
            .btn-next { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">Ome<span>TV</span></div>

    <div class="video-container">
        <div class="video-box">
            <div class="watermark">OmeTV</div>
            <div class="status-badge" id="status-box">🔴 Desconectado</div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <div class="video-box">
            <div class="watermark">TÚ</div>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-stop" onclick="detener()">STOP</button>
        <button class="btn btn-next" onclick="buscarSiguiente()">SIGUIENTE</button>
        <button class="btn btn-report" onclick="reportar()">REPORTAR</button>
    </div>

    <script>
        // Configuración de Ably y PeerJS
        const ABLY_KEY = 'HIAY1w.x1_3_Q:8kTgjL3KPHdx8_NsMeccHEcrOI_g5NAqj76-aDBl3Fs'; 
        const ably = new Ably.Realtime(ABLY_KEY);
        const canalMatch = ably.channels.get('recreo-match');
        
        let peer, localStream, currentCall;
        const statusBox = document.getElementById('status-box');

        async function iniciar() {
            try {
                // Capturar cámara y audio
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                
                // Iniciar PeerJS para la conexión directa
                peer = new Peer();
                
                peer.on('open', (id) => {
                    statusBox.innerText = "🟢 Listo para buscar";
                });

                // Recibir llamada de otro compañero
                peer.on('call', (call) => {
                    if (currentCall) currentCall.close();
                    currentCall = call;
                    call.answer(localStream);
                    call.on('stream', (s) => {
                        document.getElementById('remoteVideo').srcObject = s;
                        statusBox.innerText = "🤝 Conectado";
                    });
                });

                // Escuchar quién está pulsando "Siguiente"
                canalMatch.subscribe('buscando', (msg) => {
                    if (msg.data.peerId !== peer.id && !currentCall) {
                        llamarA(msg.data.peerId);
                    }
                });

            } catch (err) {
                statusBox.innerText = "❌ Activa la cámara";
                alert("Debes permitir el acceso a la cámara y micro.");
            }
        }

        function buscarSiguiente() {
            if (currentCall) currentCall.close();
            document.getElementById('remoteVideo').srcObject = null;
            statusBox.innerText = "🔍 Buscando...";
            // Publicar mi ID para que alguien me llame
            canalMatch.publish('buscando', { peerId: peer.id });
        }

        function llamarA(id) {
            const call = peer.call(id, localStream);
            call.on('stream', (s) => {
                document.getElementById('remoteVideo').srcObject = s;
                statusBox.innerText = "🤝 Conectado";
                currentCall = call;
            });
        }

        function detener() {
            if (currentCall) currentCall.close();
            document.getElementById('remoteVideo').srcObject = null;
            statusBox.innerText = "⏹️ Detenido";
        }

        function reportar() {
            alert("Usuario reportado. Saltando al siguiente...");
            buscarSiguiente();
        }

        iniciar();
    </script>
</body>
</html>
