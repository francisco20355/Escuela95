<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AsdTV | Escuela 263</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:Poppins;
background:black;
color:white;
overflow:hidden;
}

/* ===== HEADER ===== */

.app-header{
height:60px;
background:#111;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:2px solid #222;
}

.brand-name h1{
color:#ffa500;
font-size:22px;
}

/* ===== VIDEO AREA ===== */

.video-area{
position:relative;
width:100%;
height:calc(100vh - 170px);
background:black;
overflow:hidden;
}

/* REMOTE VIDEO */

#peer-video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 0.4s;
}

#peer-video.connected{
opacity:1;
}

/* LOCAL FLOAT VIDEO */

#local-view{
position:absolute;
width:130px;
height:180px;
bottom:100px;
right:15px;
border-radius:14px;
object-fit:cover;
border:2px solid rgba(255,255,255,0.2);
z-index:5;
transform:scaleX(-1);
background:black;
}

/* STATUS */

.status-pill{
position:absolute;
bottom:15px;
left:15px;
background:rgba(0,0,0,0.7);
padding:6px 14px;
border-radius:25px;
font-size:11px;
}

/* LOADER */

.loader-screen{
position:absolute;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.spinner{
width:60px;
height:60px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{ transform:rotate(360deg); }
}

/* CONTROLS */

.controls-nav{
height:110px;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:center;
gap:14px;
padding:0 20px;
border-top:2px solid #222;
}

.btn-ui{
width:70px;
height:70px;
border-radius:20px;
border:none;
font-size:26px;
cursor:pointer;
background:#2a2a2a;
color:white;
transition:0.2s;
}

.btn-ui:active{
transform:scale(0.9);
}

.btn-next{
flex:1;
background:#007bff;
font-size:18px;
font-weight:700;
}

.btn-danger{
background:#ff3b30;
}

/* TOAST MESSAGE */

#toast{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
padding:10px 18px;
border-radius:12px;
font-size:14px;
display:none;
z-index:20;
}

/* MOBILE */

@media(max-width:600px){

#local-view{
width:95px;
height:130px;
bottom:105px;
}

}

</style>

</head>

<body>

<header class="app-header">

<div class="brand-name">
<h1>AsdTV</h1>
</div>

</header>

<main class="video-area">

<div id="toast"></div>

<div class="loader-screen" id="searching-ui">
<div class="spinner"></div>
</div>

<video id="peer-video" autoplay playsinline></video>

<video id="local-view" autoplay muted playsinline></video>

<div class="status-pill" id="connection-label">
DESCONECTADO
</div>

</main>

<footer class="controls-nav">

<button class="btn-ui" onclick="toggleMicrophone()" id="audio-toggle">
🎤
</button>

<button class="btn-ui" onclick="rotateCamera()">
🔄
</button>

<button class="btn-ui btn-next" onclick="triggerNext()">
Siguiente
</button>

<button class="btn-ui btn-danger" onclick="reportAction()">
⚠️
</button>

</footer>

<script>

/* ===== CONFIG ===== */

const ABLY_SECRET = "TU_API_KEY_AQUI";

const ablyInstance = new Ably.Realtime(ABLY_SECRET);
const networkingChannel = ablyInstance.channels.get('recreo-match');

/* ===== STATE ===== */

let peerConnector;
let localMediaStream;
let activeSessionCall;

let blockList = [];

let microphoneActive = true;
let activeFacingMode = "user";

/* ===== TOAST ===== */

function showToast(msg){

const toast=document.getElementById("toast");

toast.innerText=msg;
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2000);

}

/* ===== INIT ===== */

async function initializeApp(){

try{

localMediaStream = await navigator.mediaDevices.getUserMedia({

video:{ facingMode: activeFacingMode },
audio:true

});

document.getElementById("local-view").srcObject=localMediaStream;

peerConnector = new Peer();

peerConnector.on("open",()=>{

document.getElementById("connection-label").innerText="SISTEMA ONLINE";

});

peerConnector.on("call",(incomingCall)=>{

if(blockList.includes(incomingCall.peer)) return;

if(activeSessionCall)
closeCurrentSession();

activeSessionCall=incomingCall;

incomingCall.answer(localMediaStream);

attachStreamToView(incomingCall);

});

networkingChannel.subscribe("buscando",(message)=>{

const peerId=message.data.uid;

if(peerId!==peerConnector.id && !activeSessionCall){

startCall(peerId);

}

});

}catch(err){

alert("Permite cámara y micrófono");

}

}

/* ===== CALL ===== */

function startCall(id){

const call = peerConnector.call(id,localMediaStream);

activeSessionCall=call;

attachStreamToView(call);

}

function attachStreamToView(call){

document.getElementById("searching-ui").style.display="none";

call.on("stream",(remoteStream)=>{

const video=document.getElementById("peer-video");

video.srcObject=remoteStream;

video.classList.add("connected");

document.getElementById("connection-label").innerText="CONECTADO";

});

call.on("close",closeCurrentSession);

}

/* ===== NEXT ===== */

function triggerNext(){

if(activeSessionCall){

blockList.push(activeSessionCall.peer);

closeCurrentSession();

}

document.getElementById("searching-ui").style.display="flex";

networkingChannel.publish("buscando",{

uid:peerConnector.id

});

}

/* ===== MIC ===== */

function toggleMicrophone(){

microphoneActive=!microphoneActive;

localMediaStream.getAudioTracks()[0].enabled=microphoneActive;

const btn=document.getElementById("audio-toggle");

btn.innerText=microphoneActive?"🎤":"🔇";

showToast(

microphoneActive?
"🎤 Micrófono activado":
"🔇 Micrófono silenciado"

);

}

/* ===== CAMERA ===== */

async function rotateCamera(){

activeFacingMode = activeFacingMode==="user"
? "environment"
: "user";

localMediaStream.getTracks().forEach(t=>t.stop());

localMediaStream = await navigator.mediaDevices.getUserMedia({

video:{ facingMode:activeFacingMode },
audio:true

});

document.getElementById("local-view").srcObject=localMediaStream;

showToast("📷 Cámara rotada");

}

/* ===== CLOSE ===== */

function closeCurrentSession(){

if(activeSessionCall)
activeSessionCall.close();

activeSessionCall=null;

document.getElementById("peer-video").srcObject=null;

document.getElementById("peer-video").classList.remove("connected");

document.getElementById("connection-label").innerText="DESCONECTADO";

}

/* ===== REPORT ===== */

function reportAction(){

showToast("⚠️ Usuario reportado");

setTimeout(()=>{

triggerNext();

},800);

}

/* START */

initializeApp();

</script>

</body>
</html>
