<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsdTV Pro Voice Edition</title>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

/* ===== TEMA OSCURO MODERNO ===== */

body{
margin:0;
font-family:Arial, sans-serif;
background:#0d0d0d;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

header{
height:60px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #222;
}

/* VIDEO AREA */

.main{
flex:1;
display:flex;
gap:10px;
padding:10px;
}

.video-box{
flex:1;
background:#000;
border-radius:14px;
overflow:hidden;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTROLES */

.controls{
height:140px;
background:#1a1a1a;
display:flex;
flex-direction:column;
gap:10px;
padding:10px;
border-top:1px solid #222;
}

/* FILA BOTONES */

.row{
display:flex;
gap:10px;
}

button{
flex:1;
height:55px;
border:none;
border-radius:14px;
background:#2a2a2a;
color:white;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

button:active{
transform:scale(0.95);
}

/* BOTON PRINCIPAL */

.next{
background:linear-gradient(45deg,#007bff,#0056b3);
font-weight:bold;
}

/* VOICE PANEL */

.voice-panel{
display:flex;
gap:8px;
}

/* RESPONSIVE */

@media(max-width:700px){

.main{
flex-direction:column;
}

.controls{
height:180px;
}

}

</style>
</head>

<body>

<header>
🎥 AsdTV Voice Edition
</header>

<div class="main">

<div class="video-box">
<video id="peer-video" autoplay playsinline></video>
</div>

<div class="video-box">
<video id="local-view" autoplay muted playsinline></video>
</div>

</div>

<div class="controls">

<div class="row">

<button onclick="toggleMicrophone()">🎤</button>

<button onclick="rotateCamera()">🔄</button>

<button class="next" onclick="triggerNext()">SIGUIENTE</button>

<button onclick="reportUser()">⚠️</button>

</div>

<div class="voice-panel">

<button onclick="setVoiceEffect('normal')">
🎤 Normal
</button>

<button onclick="setVoiceEffect('robot')">
🤖 Robot
</button>

<button onclick="setVoiceEffect('man')">
🧔 Hombre
</button>

<button onclick="setVoiceEffect('woman')">
👩 Mujer
</button>

</div>

</div>

<script>

/* ===== CONFIG ===== */

const ABLY_SECRET = "HIAY1w.x1_3_Q:8kTgjL3KPHdx8_NsMeccHEcrOI_g5NAqj76-aDBl3Fs";

const ably = new Ably.Realtime(ABLY_SECRET);
const channel = ably.channels.get("recreo-match");

/* ===== VARIABLES ===== */

let peer;
let localMediaStream;
let activeCall;

let audioContext;
let micSource;
let destination;
let currentEffect;

/* ===== INICIO ===== */

async function initialize(){

localMediaStream =
await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("local-view")
.srcObject = localMediaStream;

/* VOICE SETUP */

setupVoiceSystem();

/* PEER */

peer = new Peer();

peer.on("call", call => {

call.answer(localMediaStream);

setupCall(call);

});

channel.subscribe("search", msg => {

if(msg.data.id !== peer.id){

startCall(msg.data.id);

}

});

}

initialize();

/* ===== VOICE SYSTEM ===== */

function setupVoiceSystem(){

audioContext = new AudioContext();

micSource =
audioContext.createMediaStreamSource(localMediaStream);

destination =
audioContext.createMediaStreamDestination();

micSource.connect(destination);

localMediaStream =
new MediaStream([
...localMediaStream.getVideoTracks(),
...destination.stream.getAudioTracks()
]);

}

/* EFECTOS */

function setVoiceEffect(type){

if(currentEffect){

micSource.disconnect();
currentEffect.disconnect();

}

if(type==="normal"){

micSource.connect(destination);

return;

}

/* ROBOT */

if(type==="robot"){

const distortion =
audioContext.createWaveShaper();

distortion.curve =
makeDistortionCurve(400);

distortion.oversample="4x";

micSource.connect(distortion);
distortion.connect(destination);

currentEffect = distortion;

}

/* HOMBRE */

if(type==="man"){

const filter =
audioContext.createBiquadFilter();

filter.type="lowpass";
filter.frequency.value=500;

micSource.connect(filter);
filter.connect(destination);

currentEffect = filter;

}

/* MUJER */

if(type==="woman"){

const filter =
audioContext.createBiquadFilter();

filter.type="highpass";
filter.frequency.value=1200;

micSource.connect(filter);
filter.connect(destination);

currentEffect = filter;

}

/* actualizar audio en llamada */

if(activeCall){

const sender =
activeCall.peerConnection
.getSenders()
.find(s=>s.track.kind==="audio");

if(sender){

sender.replaceTrack(
destination.stream
.getAudioTracks()[0]
);

}

}

}

/* DISTORSION */

function makeDistortionCurve(amount){

const k = amount;
const n = 44100;
const curve = new Float32Array(n);

for(let i=0;i<n;i++){

let x = i*2/n -1;

curve[i] =
(3+k)*x*20*Math.PI/180 /
(Math.PI + k*Math.abs(x));

}

return curve;

}

/* ===== LLAMADAS ===== */

function startCall(id){

const call =
peer.call(id, localMediaStream);

setupCall(call);

}

function setupCall(call){

activeCall = call;

call.on("stream", stream => {

document
.getElementById("peer-video")
.srcObject = stream;

});

call.on("close", ()=>{

activeCall=null;

});

}

/* ===== BOTONES ===== */

function triggerNext(){

if(activeCall){

activeCall.close();

}

channel.publish("search",{
id:peer.id
});

}

function toggleMicrophone(){

const audioTrack =
localMediaStream
.getAudioTracks()[0];

audioTrack.enabled =
!audioTrack.enabled;

}

function rotateCamera(){

alert("Rotación simple aquí");

}

function reportUser(){

alert("Usuario reportado");

}

</script>

</body>
</html>
