<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AsdTV nuevas actualizaciones</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff;
            --danger: #ff3b30;
            --dark: #121212;
            --accent: #ffa500;
            --gray: #1e1e1e;
        }

        body { 
            margin: 0; 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
        }

        /* --- NUEVO: ESTILOS DE RACHA --- */
        .racha-container {
            position: absolute; top: 75px; right: 15px; padding: 8px 18px; border-radius: 25px;
            font-weight: bold; display: flex; align-items: center; gap: 8px; z-index: 20;
            transition: all 0.5s ease; border: 2px solid rgba(255,255,255,0.2); color: white;
        }
        .lvl-bronce { background: #cd7f32; box-shadow: 0 0 10px #cd7f32; }
        .lvl-plata { background: #c0c0c0; color: #333; box-shadow: 0 0 15px #fff; }
        .lvl-oro { background: #ffd700; color: #442200; box-shadow: 0 0 20px #ffd700; }
        .lvl-diamante { background: #00d4ff; box-shadow: 0 0 25px #00d4ff; }
        .lvl-esmeralda { background: #2ecc71; box-shadow: 0 0 30px #2ecc71; }
        .lvl-maestro { background: #9b59b6; box-shadow: 0 0 35px #9b59b6; }
        .lvl-leyenda { 
            background: linear-gradient(90deg, #ff0000, #ff00ff, #0000ff, #00ffff);
            background-size: 300% 300%; animation: grad 2s infinite alternate;
            box-shadow: 0 0 50px #ff00ff; border: 3px solid #fff; transform: scale(1.1);
        }
        @keyframes grad { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        /* ------------------------------ */

        .top-bar {
            height: 60px;
            background: var(--gray);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 22px;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 1px solid #333;
            z-index: 10;
        }
        .top-bar span { color: white; margin-left: 5px; }

        .video-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            background: #000;
            min-height: 0;
            gap: 2px;
        }

        .video-box {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            background: #000;
            transition: transform 0.3s ease;
        }

        #localVideo { transform: scaleX(-1); border-left: 2px solid var(--gray); }

        .loader-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-bar {
            height: 100px;
            background: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 10px;
            border-top: 1px solid #333;
        }

        .btn {
            border: none;
            border-radius: 12px;
            height: 60px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active { transform: scale(0.95); }

        .btn-stop { background: #3a3a3a; width: 60px; }
        .btn-util { background: #444; width: 60px; font-size: 20px; }
        .btn-report { background: var(--danger); width: 60px; font-size: 18px; }
        .btn-next { background: var(--primary); flex: 1; font-size: 18px; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        .btn-util.active { background: var(--accent); }

        .watermark { position: absolute; top: 15px; left: 15px; color: rgba(255,255,255,0.4); font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .status-badge { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); }

        @media (max-width: 768px) {
            .video-container { flex-direction: column; }
            .bottom-bar { height: 110px; padding-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">Asd<span>TV</span></div>

    <div class="racha-container lvl-bronce" id="racha-ui">
        <span id="racha-icono">🔥</span> <span>Racha:</span> <span id="racha-numero">0</span>
    </div>

    <div class="video-container">
        <div class="video-box">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
                <span>Buscando compañero...</span>
            </div>
            <div class="watermark">Remoto</div>
            <div class="status-badge" id="status-box">🔴 Desconectado</div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <div class="video-box">
            <div class="watermark">TÚ</div>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-stop" onclick="detener()">OFF</button>
        <button class="btn btn-util" id="muteBtn" onclick="toggleMute()">🎤</button>
        <button class="btn btn-util" onclick="switchCamera()">🔄</button>
        <button class="btn btn-next" onclick="buscarSiguiente()">SIGUIENTE</button>
        <button class="btn btn-report" onclick="reportar()">⚠️</button>
    </div>

    <script>
        const ABLY_KEY = 'HIAY1w.x1_3_Q:8kTgjL3KPHdx8_NsMeccHEcrOI_g5NAqj76-aDBl3Fs'; 
        const ably = new Ably.Realtime(ABLY_KEY);
        const canalMatch = ably.channels.get('recreo-match');
        
        let peer, localStream, currentCall;
        let listaNegra = [];
        let isMuted = false;
        let currentFacingMode = 'user';

        const statusBox = document.getElementById('status-box');
        const loader = document.getElementById('loader');

        // --- NUEVA LÓGICA DE RACHA PERSISTENTE ---
        let contadorRacha = parseInt(localStorage.getItem('rachaAsdTV')) || 0;
        let ultimaActividad = localStorage.getItem('ultimaConexionAsdTV');

        function verificarVencimiento() {
            if (ultimaActividad && contadorRacha > 0) {
                const ahora = new Date();
                const horaActual = ahora.getHours();
                // Tregua nocturna: de 00:00 a 08:00 no se resetea
                if (horaActual >= 0 && horaActual < 8) return; 

                const tiempoLimite = 4 * 60 * 60 * 1000; // 4 Horas
                if (ahora.getTime() - parseInt(ultimaActividad) > tiempoLimite) {
                    contadorRacha = 0;
                    localStorage.setItem('rachaAsdTV', 0);
                }
            }
        }

        function actualizarVisualRacha() {
            const ui = document.getElementById('racha-ui');
            const icono = document.getElementById('racha-icono');
            const num = document.getElementById('racha-numero');

            localStorage.setItem('rachaAsdTV', contadorRacha);
            localStorage.setItem('ultimaConexionAsdTV', new Date().getTime());

            ui.className = 'racha-container';
            if (contadorRacha >= 150) { ui.classList.add('lvl-leyenda'); icono.innerText = "🌌"; }
            else if (contadorRacha >= 111) { ui.classList.add('lvl-maestro'); icono.innerText = "🔮"; }
            else if (contadorRacha >= 81) { ui.classList.add('lvl-esmeralda'); icono.innerText = "💎"; }
            else if (contadorRacha >= 51) { ui.classList.add('lvl-diamante'); icono.innerText = "❄️"; }
            else if (contadorRacha >= 31) { ui.classList.add('lvl-oro'); icono.innerText = "👑"; }
            else if (contadorRacha >= 11) { ui.classList.add('lvl-plata'); icono.innerText = "✨"; }
            else { ui.classList.add('lvl-bronce'); icono.innerText = "🔥"; }
            num.innerText = contadorRacha;
        }
        // -----------------------------------------

        async function iniciar() {
            verificarVencimiento(); // Revisar racha al abrir
            actualizarVisualRacha(); // Dibujar racha inicial
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode }, 
                    audio: true 
                });
                document.getElementById('localVideo').srcObject = localStream;
                
                peer = new Peer();
                
                peer.on('open', (id) => {
                    statusBox.innerText = "🟢 Sistema Listo";
                });

                peer.on('call', (call) => {
                    if (currentCall) finalizarLlamada();
                    if (listaNegra.includes(call.peer)) return;
                    currentCall = call;
                    call.answer(localStream);
                    gestionarLlamada(call);
                });

                canalMatch.subscribe('buscando', (msg) => {
                    if (msg.data.peerId !== peer.id && !currentCall && !listaNegra.includes(msg.data.peerId)) {
                        llamarA(msg.data.peerId);
                    }
                });

            } catch (err) {
                statusBox.innerText = "❌ Error de Cámara";
            }
        }

        function gestionarLlamada(call) {
            loader.style.display = 'none';
            call.on('stream', (s) => {
                document.getElementById('remoteVideo').srcObject = s;
                statusBox.innerText = "🤝 En línea";
                
                // NUEVO: Sumar racha al conectar con alguien
                contadorRacha++;
                actualizarVisualRacha();
            });
            call.on('close', () => finalizarLlamada());
            call.on('error', () => finalizarLlamada());
        }

        function llamarA(id) {
            const call = peer.call(id, localStream);
            currentCall = call;
            gestionarLlamada(call);
        }

        function buscarSiguiente() {
            if (currentCall) {
                const anteriorId = currentCall.peer;
                listaNegra.push(anteriorId);
                setTimeout(() => {
                    listaNegra = listaNegra.filter(id => id !== anteriorId);
                }, 10000);
                finalizarLlamada();
            }
            loader.style.display = 'flex';
            statusBox.innerText = "🔍 Buscando...";
            canalMatch.publish('buscando', { peerId: peer.id });
        }

        async function switchCamera() {
            if (!localStream) return;
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            
            const videoTrackOld = localStream.getVideoTracks()[0];
            videoTrackOld.stop();

            try {
                const nuevoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode },
                    audio: true
                });

                const videoTrackNew = nuevoStream.getVideoTracks()[0];
                localStream.removeTrack(videoTrackOld);
                localStream.addTrack(videoTrackNew);

                const localVid = document.getElementById('localVideo');
                localVid.srcObject = localStream;
                localVid.style.transform = (currentFacingMode === 'user') ? "scaleX(-1)" : "scaleX(1)";

                if (currentCall && currentCall.peerConnection) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrackNew);
                }
                statusBox.innerText = "📷 Cámara Switcheada";
            } catch (e) {
                alert("No se pudo cambiar de cámara");
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.classList.toggle('active');
            btn.innerText = isMuted ? "🔇" : "🎤";
        }

        function finalizarLlamada() {
            if (currentCall) currentCall.close();
            currentCall = null;
            document.getElementById('remoteVideo').srcObject = null;
            statusBox.innerText = "🔴 Desconectado";
            loader.style.display = 'none';
        }

        function detener() {
            finalizarLlamada();
            statusBox.innerText = "⏹️ App en Pausa";
        }

        function reportar() {
            alert("Usuario reportado.");
            buscarSiguiente();
        }

        iniciar();
    </script>
</body>
</html>
