<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AsdTV | Edición Global Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff;
            --danger: #ff3b30;
            --dark: #0a0a0a;
            --accent: #ffa500;
            --gray: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
        }

        /* --- BARRA SUPERIOR PROFESIONAL --- */
        .top-bar {
            height: 65px;
            background: var(--gray);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #333;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .brand { display: flex; align-items: center; gap: 8px; }
        .brand h1 { font-size: 20px; margin: 0; color: var(--accent); letter-spacing: 1px; }
        .brand span { font-size: 10px; background: var(--primary); padding: 2px 6px; border-radius: 4px; color: white; }

        /* CONTENEDOR DE RACHA DINÁMICO */
        .racha-ui {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 16px;
            border-radius: 50px;
            font-family: 'Roboto Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid var(--glass);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0,0,0,0.3);
        }

        /* ESTADOS DE LA RACHA */
        .lvl-bronce { background: linear-gradient(45deg, #cd7f32, #8b4513); color: white; }
        .lvl-plata { background: linear-gradient(45deg, #bdc3c7, #2c3e50); color: white; }
        .lvl-oro { background: linear-gradient(45deg, #f1c40f, #f39c12); color: black; box-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .lvl-diamante { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); }
        .lvl-leyenda { 
            background: linear-gradient(90deg, #ff0000, #ff00ff, #0000ff, #00ffff);
            background-size: 400% 400%;
            animation: hyper-gradient 3s ease infinite;
            border: 2px solid #fff;
            color: white;
            transform: scale(1.05);
        }

        @keyframes hyper-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- VIDEO LAYOUT --- */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: row;
            background: #000;
            gap: 4px;
            padding: 4px;
        }

        .video-wrapper {
            flex: 1;
            position: relative;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        #localVideo { transform: scaleX(-1); border: 1px solid #222; }

        /* UI OVERLAYS */
        .overlay-label {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            z-index: 5;
        }

        .connection-status {
            position: absolute;
            bottom: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            border: 1px solid var(--glass);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3b30; }
        .dot.online { background: #4cd964; box-shadow: 0 0 10px #4cd964; }

        /* LOADING SPINNER */
        .searching-layer {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
        }

        .spinner-pro {
            width: 45px;
            height: 45px;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-bottom-color: var(--accent);
            border-radius: 50%;
            animation: spin-triple 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin-triple { 100% { transform: rotate(360deg); } }

        /* --- CONTROL BAR --- */
        .controls {
            height: 110px;
            background: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 0 15px;
            border-top: 1px solid #333;
        }

        .action-btn {
            border: none;
            border-radius: 16px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-family: inherit;
        }

        .btn-round { width: 65px; background: #2a2a2a; font-size: 22px; }
        .btn-round:active { transform: scale(0.9); background: #333; }
        
        .btn-main {
            flex: 1;
            background: var(--primary);
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        .btn-danger { background: var(--danger); width: 65px; font-size: 20px; }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            .main-stage { flex-direction: column; }
            .controls { height: 130px; padding-bottom: 30px; }
            .racha-ui { padding: 4px 10px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="brand">
            <h1>AsdTV</h1>
            <span>PRO</span>
        </div>
        
        <div id="racha-master" class="racha-ui lvl-bronce">
            <span id="racha-icon">🔥</span>
            <span id="racha-val">0</span>
        </div>
    </header>

    <main class="main-stage">
        <div class="video-wrapper">
            <div class="searching-layer" id="search-ui">
                <div class="spinner-pro"></div>
                <p style="margin-top:15px; font-size:12px; opacity:0.7;">Escaneando servidores...</p>
            </div>
            <div class="overlay-label">En Vivo</div>
            <video id="remote-feed" autoplay playsinline></video>
            <div class="connection-status">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">ESPERANDO</span>
            </div>
        </div>

        <div class="video-wrapper">
            <div class="overlay-label" style="background: var(--primary);">Tú</div>
            <video id="local-feed" autoplay muted playsinline></video>
        </div>
    </main>

    <nav class="controls">
        <button class="action-btn btn-round" onclick="muteHandler()" id="m-btn">🎤</button>
        <button class="action-btn btn-round" onclick="cameraFlip()">🔄</button>
        <button class="action-btn btn-main" onclick="nextPeer()">Siguiente</button>
        <button class="action-btn btn-danger" onclick="sendReport()">⚠️</button>
    </nav>

    <script>
        /**
         * CONFIGURACIÓN GLOBAL
         * AsdTV PRO - Lógica de Racha y Conectividad
         */
        const ABLY_KEY = 'HIAY1w.x1_3_Q:8kTgjL3KPHdx8_NsMeccHEcrOI_g5NAqj76-aDBl3Fs';
        const ably = new Ably.Realtime(ABLY_KEY);
        const matchChannel = ably.channels.get('recreo-match');
        
        let p2p, streamIn, activeCall;
        let blackList = [];
        let muted = false;
        let camMode = 'user';

        // Lógica de Persistencia
        let rachaCount = parseInt(localStorage.getItem('_atv_streak')) || 0;
        let lastSeen = localStorage.getItem('_atv_ts');

        /**
         * GESTOR DE RACHA: El corazón del sistema
         */
        function validateStreak() {
            if (lastSeen && rachaCount > 0) {
                const now = new Date();
                const hr = now.getHours();
                // Ventana de protección nocturna (00:00 a 08:00)
                if (hr >= 0 && hr < 8) return;

                const diff = now.getTime() - parseInt(lastSeen);
                if (diff > (4 * 60 * 60 * 1000)) { // 4 Horas limite
                    rachaCount = 0;
                    saveState();
                }
            }
        }

        function saveState() {
            localStorage.setItem('_atv_streak', rachaCount);
            localStorage.setItem('_atv_ts', new Date().getTime());
            renderRacha();
        }

        function renderRacha() {
            const box = document.getElementById('racha-master');
            const icon = document.getElementById('racha-icon');
            const val = document.getElementById('racha-val');
            
            box.className = 'racha-ui';
            if (rachaCount >= 150) { box.classList.add('lvl-leyenda'); icon.innerText = "🌌"; }
            else if (rachaCount >= 111) { box.classList.add('lvl-maestro'); icon.innerText = "🔮"; }
            else if (rachaCount >= 81) { box.classList.add('lvl-esmeralda'); icon.innerText = "💎"; }
            else if (rachaCount >= 51) { box.classList.add('lvl-diamante'); icon.innerText = "❄️"; }
            else if (rachaCount >= 31) { box.classList.add('lvl-oro'); icon.innerText = "👑"; }
            else if (rachaCount >= 11) { box.classList.add('lvl-plata'); icon.innerText = "✨"; }
            else { box.classList.add('lvl-bronce'); icon.innerText = "🔥"; }
            
            val.innerText = rachaCount;
        }

        /**
         * SISTEMA DE VIDEO Y LLAMADAS
         */
        async function bootApp() {
            validateStreak();
            renderRacha();
            
            try {
                streamIn = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: camMode }, 
                    audio: true 
                });
                document.getElementById('local-feed').srcObject = streamIn;
                
                p2p = new Peer();
                
                p2p.on('open', (id) => {
                    console.log('ID Peer Generado:', id);
                    document.getElementById('status-dot').classList.add('online');
                    document.getElementById('status-text').innerText = "SISTEMA LISTO";
                });

                p2p.on('call', (incoming) => {
                    if (blackList.includes(incoming.peer)) return;
                    if (activeCall) closeSession();
                    activeCall = incoming;
                    incoming.answer(streamIn);
                    handlePipeline(incoming);
                });

                matchChannel.subscribe('buscando', (msg) => {
                    if (msg.data.pid !== p2p.id && !activeCall && !blackList.includes(msg.data.pid)) {
                        requestPeer(msg.data.pid);
                    }
                });

            } catch (err) {
                alert("Error: Revisa los permisos de cámara.");
            }
        }

        function requestPeer(targetId) {
            const call = p2p.call(targetId, streamIn);
            activeCall = call;
            handlePipeline(call);
        }

        function handlePipeline(call) {
            document.getElementById('search-ui').style.display = 'none';
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-feed').srcObject = remoteStream;
                document.getElementById('status-text').innerText = "EN LÍNEA";
                rachaCount++;
                saveState();
            });
            call.on('close', () => closeSession());
            call.on('error', () => closeSession());
        }

        function nextPeer() {
            if (activeCall) {
                const pId = activeCall.peer;
                blackList.push(pId);
                setTimeout(() => { blackList = blackList.filter(i => i !== pId); }, 15000);
                closeSession();
            }
            document.getElementById('search-ui').style.display = 'flex';
            matchChannel.publish('buscando', { pid: p2p.id });
        }

        /**
         * UTILIDADES DE HARDWARE
         */
        async function cameraFlip() {
            camMode = (camMode === 'user') ? 'environment' : 'user';
            streamIn.getTracks().forEach(t => t.stop());
            
            try {
                streamIn = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camMode }, audio: true });
                document.getElementById('local-feed').srcObject = streamIn;
                document.getElementById('local-feed').style.transform = (camMode === 'user') ? "scaleX(-1)" : "scaleX(1)";
                
                if (activeCall && activeCall.peerConnection) {
                    const sender = activeCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                    sender.replaceTrack(streamIn.getVideoTracks()[0]);
                }
            } catch (e) { console.error("Error Switch Cam"); }
        }

        function muteHandler() {
            muted = !muted;
            streamIn.getAudioTracks()[0].enabled = !muted;
            document.getElementById('m-btn').innerText = muted ? "🔇" : "🎤";
            document.getElementById('m-btn').style.background = muted ? "var(--danger)" : "#2a2a2a";
        }

        function closeSession() {
            if (activeCall) activeCall.close();
            activeCall = null;
            document.getElementById('remote-feed').srcObject = null;
            document.getElementById('status-text').innerText = "DESCONECTADO";
        }

        function sendReport() {
            alert("Usuario reportado. Buscando nuevo compañero...");
            nextPeer();
        }

        // Ejecución inicial
        bootApp();
    </script>
</body>
                                                                          </html>
